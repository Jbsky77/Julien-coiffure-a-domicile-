name: Reliability tests
on:
  push:
    branches: [codex/fiabilisation-prioritaire]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  critical-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt pytest
      - run: PYTHONPATH=backend pytest -q backend/tests/test_reliability_priority.py
